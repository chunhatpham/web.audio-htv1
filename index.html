<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio - Trang Web Xem Phim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CÀI ĐẶT MÀU SẮC CHỦ ĐẠO --- */
        :root {
            --bg-dark: #1a1a1d;
            --bg-card: #2d2d34;
            --accent-color: #ffb703;
            --accent-hover: #ff9e00;
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden; /* Ngăn scroll ngang khi menu trượt ra */
        }

        /* --- PHẦN HEADER --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo-container img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }

        .logo-container h1 {
            font-size: 24px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .action-icon {
            font-size: 24px;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .action-icon:hover {
            color: var(--accent-color);
        }

        /* --- SIDE MENU (MENU TRƯỢT TỪ PHẢI) --- */
        .side-menu {
            position: fixed;
            top: 0;
            right: -300px; /* Ẩn hoàn toàn sang bên phải */
            width: 280px;
            height: 100vh;
            background-color: var(--bg-card);
            z-index: 1002; /* Nằm trên cả overlay */
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Hiệu ứng lướt mượt */
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .side-menu.active {
            right: 0; /* Hiện ra sát viền phải */
        }

        /* Phần đầu của Menu trượt */
        .side-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #3d3d46;
        }

        .side-menu-header h2 {
            color: var(--accent-color);
            font-size: 20px;
        }

        .close-menu-icon {
            font-size: 24px;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
        }

        .close-menu-icon:hover {
            color: var(--accent-color);
            transform: scale(1.2);
        }

        /* Các mục trong Menu trượt */
        .side-menu-links {
            display: flex;
            flex-direction: column;
            margin-top: 10px;
        }

        .side-menu-links a {
            color: var(--text-light);
            text-decoration: none;
            padding: 15px 20px;
            font-size: 16px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .side-menu-links a:hover {
            background-color: #3d3d46;
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 25px; /* Thụt đầu dòng khi lướt chuột */
        }

        .side-menu-links i {
            width: 25px;
            margin-right: 10px;
            color: var(--text-muted);
        }

        .side-menu-links a:hover i {
            color: var(--accent-color);
        }

        /* Lớp nền mờ (Overlay) khi mở menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* --- THANH TÌM KIẾM --- */
        .search-bar-container {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            background-color: #222228;
            padding: 15px 20px;
            display: none;
            justify-content: center;
            z-index: 999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--accent-color);
            animation: slideDown 0.3s ease forwards;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .search-bar-container.active {
            display: flex;
        }

        .search-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
        }

        .search-wrapper input {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 25px 0 0 25px;
            outline: none;
            background-color: var(--text-light);
            color: var(--bg-dark);
        }

        .search-wrapper button {
            padding: 0 25px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 0 25px 25px 0;
            color: var(--bg-dark);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-wrapper button:hover {
            background-color: var(--accent-hover);
        }

        /* --- BONG BÓNG CHAT --- */
        .chat-bubble {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--bg-dark);
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 183, 3, 0.4);
            z-index: 998; /* Đặt dưới overlay của menu */
            transition: transform 0.3s, background-color 0.3s;
        }

        .chat-bubble:hover {
            transform: scale(1.1);
            background-color: var(--accent-hover);
        }

        /* --- PHẦN NỘI DUNG CHÍNH --- */
        main {
            margin-top: 100px;
            padding: 0 20px 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .movie-card {
            width: 100%;
            max-width: 800px;
            height: 140px;
            background-color: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); 
            border-left: 5px solid var(--bg-card);
            transition: transform 0.3s, box-shadow 0.3s, border-left-color 0.3s;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-3px);
            border-left-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(255, 183, 3, 0.25);
        }

        .movie-number {
            font-size: 32px;
            font-weight: bold;
            color: var(--text-muted);
            width: 50px;
            text-align: center;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .movie-card:hover .movie-number {
            color: var(--accent-color);
        }

        .movie-thumbnail {
            width: 180px;
            height: 110px;
            background-color: #444;
            border-radius: 8px;
            margin-right: 20px;
            background-size: cover;
            background-position: center;
        }

        .movie-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .movie-info h2 {
            font-size: 20px;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .movie-info p {
            font-size: 14px;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 600px) {
            .movie-card {
                height: auto;
                flex-direction: column;
                align-items: flex-start;
                position: relative;
            }
            .movie-number {
                position: absolute;
                top: 10px;
                right: 10px;
                font-size: 24px;
            }
            .movie-thumbnail {
                width: 100%;
                height: 150px;
                margin-bottom: 10px;
                margin-right: 0;
            }
            .search-wrapper { flex-direction: column; gap: 10px; }
            .search-wrapper input, .search-wrapper button { border-radius: 8px; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay"></div>

    <header>
        <div class="logo-container">
            <img src="https://via.placeholder.com/40x40/ffb703/1a1a1d?text=A" alt="Audio Logo">
            <h1>Audio</h1>
        </div>

        <div class="right-actions">
            <i class="fa-solid fa-magnifying-glass action-icon" id="searchBtn" title="Tìm kiếm"></i>
            <i class="fa-solid fa-bars action-icon" id="menuBtn" title="Menu"></i>
        </div>
    </header>

    <nav class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <h2>Mục Lục</h2>
            <i class="fa-solid fa-xmark close-menu-icon" id="closeMenuBtn" title="Đóng"></i>
        </div>
        <div class="side-menu-links">
            <a href="#"><i class="fa-solid fa-house"></i> Trang chủ</a>
            <a href="danhsach.html" target="_blank"><i class="fa-solid fa-list"></i> Danh sách</a>
            <a href="lienhe.html" target="_blank"><i class="fa-solid fa-envelope"></i> Liên hệ</a>
        </div>
    </nav>

    <div class="search-bar-container" id="searchBar">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Nhập tên phim bạn muốn tìm...">
            <button type="button">Tìm kiếm</button>
        </div>
    </div>

    <div class="chat-bubble" title="Hỗ trợ trực tuyến">
        <i class="fa-solid fa-comment-dots"></i>
    </div>

    <main id="movie-list">
    </main>

    <script>
        // 1. TẮT MỞ THANH TÌM KIẾM
        const searchBtn = document.getElementById('searchBtn');
        const searchBar = document.getElementById('searchBar');
        const searchInput = document.getElementById('searchInput');

        searchBtn.addEventListener('click', () => {
            searchBar.classList.toggle('active');
            if (searchBar.classList.contains('active')) {
                searchInput.focus();
            }
        });

        // 2. ĐIỀU KHIỂN MENU TRƯỢT VÀ OVERLAY
        const menuBtn = document.getElementById('menuBtn');
        const sideMenu = document.getElementById('sideMenu');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        const menuOverlay = document.getElementById('menuOverlay');

        // Hàm mở menu
        function openMenu() {
            sideMenu.classList.add('active');
            menuOverlay.classList.add('active');
        }

        // Hàm đóng menu
        function closeMenu() {
            sideMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
        }

        // Gắn sự kiện click
        menuBtn.addEventListener('click', openMenu);
        closeMenuBtn.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu); // Bấm ra ngoài vùng tối cũng đóng menu

        // 3. TẠO 10 KHUNG PHIM DEMO
        const movieListContainer = document.getElementById('movie-list');
        
        for (let i = 1; i <= 10; i++) {
            const movieCard = document.createElement('div');
            movieCard.classList.add('movie-card');
            
            movieCard.innerHTML = `
                <div class="movie-number">${i}</div>
                <div class="movie-thumbnail" style="background-image: url('https://picsum.photos/seed/movie${i}/200/150');"></div>
                <div class="movie-info">
                    <h2>Tên Phim Audio Số ${i}</h2>
                    <p>Mô tả ngắn cho bộ phim số ${i}. Khi bạn kết hợp với cơ sở dữ liệu thật, các phần này sẽ được thay thế bằng hình ảnh và nội dung thực tế của phim.</p>
                </div>
            `;
            movieListContainer.appendChild(movieCard);
        }
    </script>
</body>
</html>
